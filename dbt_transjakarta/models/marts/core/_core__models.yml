version: 2

models:
  - name: dim_date
    description: |
      Standard date dimension covering 2020-01-01 through 2030-12-31.
      Generated from a date spine — not sourced from GTFS. Join any
      fact's date column against `date_id` to slice by year, month,
      quarter, day-of-week, or weekend flag.
    columns:
      - name: date_id
        description: Calendar date. Primary key.
        data_tests:
          - not_null
          - unique
      - name: year
        data_tests:
          - not_null
      - name: day_of_week
        description: BigQuery convention — 1 = Sunday, 7 = Saturday.
        data_tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6, 7]
              quote: false
      - name: is_weekend
        data_tests:
          - not_null

  - name: dim_route
    description: |
      One row per Transjakarta route. Pass-through of stg_gtfs__routes with
      a derived `service_category` reflecting TJ's operational tiers
      (BRT, Mikrotrans, Royaltrans, Transjabodetabek, Rusun, Shuttle,
      Bus Wisata, Angkutan Umum Integrasi).
    columns:
      - name: route_id
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_gtfs__routes')
              field: route_id
      - name: route_type_name
        data_tests:
          - not_null
      - name: service_category
        description: TJ operational tier, derived from route_description.
        data_tests:
          - not_null

  - name: dim_service
    description: |
      One row per service_id, with a derived `service_name` (Daily,
      Weekday, Weekend, Friday only, etc.), the calendar window from
      calendar.txt, and computed active-day stats from
      int_service_calendar_unrolled — which applies calendar_dates
      exceptions when present. `active_days_count` will be 0 for any
      service whose calendar window falls entirely outside dim_date's
      range (e.g. TJ's "X" service from 2005).
    columns:
      - name: service_id
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_gtfs__calendar')
              field: service_id
      - name: service_name
        data_tests:
          - not_null
      - name: service_start_date
        data_tests:
          - not_null
      - name: active_days_count
        description: Number of distinct active dates within dim_date's window.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

  - name: fact_scheduled_trip
    description: |
      One row per realized abstract scheduled trip — every
      (trip_id × departure_time) the frequency-expansion produces.
      Does NOT enumerate service dates; downstream fact_scheduled_stop_event
      handles that. Denormalized route + service attributes are carried
      for analyst convenience.
    columns:
      - name: scheduled_trip_id
        description: Stable surrogate key (md5 hash of trip_id + departure_seconds).
        data_tests:
          - not_null
          - unique
      - name: trip_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_gtfs__trips')
              field: trip_id
      - name: route_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_route')
              field: route_id
      - name: service_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_service')
              field: service_id
      - name: departure_seconds_from_service_midnight
        description: Seconds from service-day start. 0–86399 for same-day departures.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 172800   # 48h — generous, allows next-service-day overflow
      - name: source_headway_seconds
        data_tests:
          - not_null

  - name: dim_stop
    description: |
      One row per stop with lat/lon and decoded location_type and
      wheelchair-boarding labels.
    columns:
      - name: stop_id
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_gtfs__stops')
              field: stop_id
      - name: stop_name
        data_tests:
          - not_null
      - name: location_type_name
        data_tests:
          - accepted_values:
              values: ['stop_or_platform', 'station', 'entrance_or_exit',
                       'generic_node', 'boarding_area', 'unknown']
      - name: stop_latitude
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -7.0
              max_value: -5.0
              row_condition: "stop_latitude is not null"
      - name: stop_longitude
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 106.0
              max_value: 107.5
              row_condition: "stop_longitude is not null"
